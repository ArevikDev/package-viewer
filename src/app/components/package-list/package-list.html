<div class="toolbar">
  <input
    (input)="onFilterChange($any($event.target).value)"
    placeholder="Search..."
    class="search-input border border-gray-300 px-3 py-2 rounded-lg mr-4 h-11"
  />

  <button
    [disabled]="loading$ | async"
    (click)="onRefresh()"
    title="Refresh"
    class="bg-blue-400 hover:bg-blue-600 px-2 py-2 rounded-lg cursor-pointer disabled:opacity-50"
  >
    <img src="icons/refresh.svg" class="h-7 w-7" [class.animate-spin]="loading$ | async" />
  </button>
</div>

<div class="list overflow-auto border border-gray-300 rounded-lg p-4 gap-4">
  @for (package of filteredPackages$ | async; track package.id) {
    <app-package-card
      [package]="package"
      [highlight]="(highlights$ | async)?.get(package.id) ?? null"
      (packageHovered)="onCardHover($event ? package.id : null)"
    />
  } @empty {
    <p class="text-gray-700">No packages found.</p>
  }
</div>
