<div class="toolbar">
  <input
    (input)="onFilterChange($any($event.target).value)"
    placeholder="Search..."
    class="search-input border border-gray-300 px-3 py-2 rounded-lg mr-4"
  />
  <button
    [disabled]="loading$ | async"
    (click)="onRefresh()"
    class="border px-3 py-2 bg-blue-400 hover:bg-blue-600 text-white font-bold rounded-lg cursor-pointer w-22"
  >
    @if (loading$ | async) {
      <span
        class="animate-spin inline-block h-4 w-4 border-2 border-t-transparent rounded-full"
      ></span>
    } @else {
      Refresh
    }
  </button>
</div>

<div class="list overflow-auto border border-gray-300 rounded-lg p-4 gap-4">
  @for (package of filteredPackages$ | async; track package.id) {
    <app-package-card
      [package]="package"
      [highlight]="(highlights$ | async)?.get(package.id) ?? null"
      (packageHovered)="onCardHover($event ? package.id : null)"
    />
  } @empty {
    <p class="text-gray-700">No packages found.</p>
  }
</div>
